<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Paper</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 50px;
        }
        .icon {
            font-size: 100px;
        }
        .title {
            font-size: 24px;
            margin: 20px 0;
        }
        .authors {
            font-size: 18px;
            margin: 10px 0;
        }
        .buttons {
            margin: 20px 0;
        }
        .button {
            padding: 10px 20px;
            margin: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 16px;
            display: inline-block;
        }
        .button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="icon">&#128196;</div> <!-- This is a paper icon -->
    <div class="title">Title of the Paper</div>
    <div class="authors">Author1, Author2, Author3</div>
    <div class="buttons">
        <a href="link-to-paper" class="button">Read Paper</a>
        <a href="link-to-code" class="button">View Code</a>
    </div>
</body>
</html>
